<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BasaltPass - User Console</title>
    <script>
      ;(function () {
        var fallbackTitle = document.title
        var envApiBase = '%VITE_API_BASE%'
        var apiBase = envApiBase && envApiBase !== '%VITE_API_BASE%'
          ? envApiBase
          : window.location.origin

        fetch(String(apiBase).replace(/\/$/, '') + '/api/v1/config', { credentials: 'include' })
          .then(function (response) {
            if (!response.ok) throw new Error('failed to load branding')
            return response.json()
          })
          .then(function (config) {
            var siteName = config && typeof config.site_name === 'string' ? config.site_name.trim() : ''
            if (!siteName) return
            document.title = fallbackTitle.replace(/^BasaltPass/, siteName)
          })
          .catch(function () {})
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
