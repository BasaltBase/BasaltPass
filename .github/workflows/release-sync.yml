name: Sync Release To Public Repo

on:
  push:
    tags:
      - "release-v*.*.*"

permissions:
  contents: read

jobs:
  sync-public-repo:
    runs-on: ubuntu-latest
    env:
      PUBLIC_REPO: ${{ vars.PUBLIC_REPO }}
      PUBLIC_REPO_BRANCH: ${{ vars.PUBLIC_REPO_BRANCH || 'main' }}
      PUBLIC_REPO_DIR: ${{ runner.temp }}/public-repo
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate configuration
        run: |
          if [ -z "${PUBLIC_REPO}" ]; then
            echo "Repository variable PUBLIC_REPO is required, for example: basaltbase/BasaltPass"
            exit 1
          fi

          if [ -z "${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}" ]; then
            echo "Secret PUBLIC_REPO_PUSH_TOKEN is required."
            exit 1
          fi

      - name: Parse release version
        id: version
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          VERSION="${RAW_TAG#release-v}"
          echo "raw_tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Clone public repo
        env:
          PUSH_TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        run: |
          rm -rf "${PUBLIC_REPO_DIR}"
          git clone "https://x-access-token:${PUSH_TOKEN}@github.com/${PUBLIC_REPO}.git" "${PUBLIC_REPO_DIR}"
          cd "${PUBLIC_REPO_DIR}"
          git fetch origin "${PUBLIC_REPO_BRANCH}" || true
          if git show-ref --verify --quiet "refs/remotes/origin/${PUBLIC_REPO_BRANCH}"; then
            git checkout -B "${PUBLIC_REPO_BRANCH}" "origin/${PUBLIC_REPO_BRANCH}"
          else
            git checkout --orphan "${PUBLIC_REPO_BRANCH}"
          fi

      - name: Sync files into public repo
        run: |
          mkdir -p "${PUBLIC_REPO_DIR}"
          rsync -a --delete \
            --exclude ".git/" \
            --exclude-from=".release-sync-ignore" \
            ./ "${PUBLIC_REPO_DIR}/"

      - name: Commit public release snapshot
        working-directory: ${{ env.PUBLIC_REPO_DIR }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No content changes detected."
          else
            git commit -m "release: sync from BasaltPassDev ${{ steps.version.outputs.version }}"
          fi

          git tag -fa "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "HEAD:${PUBLIC_REPO_BRANCH}"
          git push origin "refs/tags/v${{ steps.version.outputs.version }}" --force
