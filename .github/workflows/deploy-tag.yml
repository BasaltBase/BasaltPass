name: Build And Deploy From Tag

on:
  push:
    tags:
      - "deploy-prod-v*.*.*"

permissions:
  contents: read
  packages: write
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/basaltpass' }}
      GHCR_NAMESPACE: ${{ vars.GHCR_NAMESPACE || github.repository_owner }}
      SERVICE_URL: ${{ vars.SERVICE_URL }}
      BASALTPASS_DATABASE_DRIVER: ${{ vars.BASALTPASS_DATABASE_DRIVER || 'sqlite' }}
      BASALTPASS_CORS_ALLOW_ORIGINS: ${{ vars.BASALTPASS_CORS_ALLOW_ORIGINS }}
      BASALTPASS_EMAIL_PROVIDER: ${{ vars.BASALTPASS_EMAIL_PROVIDER }}
      BASALTPASS_EMAIL_FROM: ${{ vars.BASALTPASS_EMAIL_FROM }}
      BASALTPASS_EMAIL_SMTP_PORT: ${{ vars.BASALTPASS_EMAIL_SMTP_PORT }}
      BASALTPASS_EMAIL_SMTP_USE_TLS: ${{ vars.BASALTPASS_EMAIL_SMTP_USE_TLS }}
      BASALTPASS_EMAIL_SMTP_USE_SSL: ${{ vars.BASALTPASS_EMAIL_SMTP_USE_SSL }}
      BASALTPASS_EMAIL_SMTP_SKIP_CERT_VERIFY: ${{ vars.BASALTPASS_EMAIL_SMTP_SKIP_CERT_VERIFY }}
      BASALTPASS_EMAIL_AWS_SES_REGION: ${{ vars.BASALTPASS_EMAIL_AWS_SES_REGION }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          for required_var in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH GHCR_NAMESPACE SERVICE_URL BASALTPASS_DATABASE_DRIVER BASALTPASS_CORS_ALLOW_ORIGINS; do
            value="$(printenv "$required_var" || true)"
            if [ -z "$value" ]; then
              echo "Missing repository variable: $required_var"
              exit 1
            fi
          done

          for required_secret in DEPLOY_GHCR_USERNAME DEPLOY_GHCR_TOKEN PROD_JWT_SECRET BASALTPASS_DATABASE_DSN; do
            case "$required_secret" in
              DEPLOY_GHCR_USERNAME)
                value="${{ secrets.DEPLOY_GHCR_USERNAME }}"
                ;;
              DEPLOY_GHCR_TOKEN)
                value="${{ secrets.DEPLOY_GHCR_TOKEN }}"
                ;;
              PROD_JWT_SECRET)
                value="${{ secrets.PROD_JWT_SECRET }}"
                ;;
              BASALTPASS_DATABASE_DSN)
                value="${{ secrets.BASALTPASS_DATABASE_DSN }}"
                ;;
            esac

            if [ -z "$value" ]; then
              echo "Missing repository secret: $required_secret"
              exit 1
            fi
          done

          if [ -z "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ] && [ -z "${{ secrets.DEPLOY_SSH_PASSWORD }}" ]; then
            echo "Either DEPLOY_SSH_PRIVATE_KEY or DEPLOY_SSH_PASSWORD is required."
            exit 1
          fi

      - name: Parse deploy version
        id: version
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          VERSION="${RAW_TAG#deploy-prod-v}"
          echo "raw_tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "backend_image=ghcr.io/${GHCR_NAMESPACE}/basaltpass-backend:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${GHCR_NAMESPACE}/basaltpass-frontend:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub deployment
        id: create_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              auto_merge: false,
              required_contexts: []
            });
            core.setOutput('deployment_id', String(response.data.id));

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend.Dockerfile
          push: true
          tags: |
            ${{ steps.version.outputs.backend_image }}
            ghcr.io/${{ env.GHCR_NAMESPACE }}/basaltpass-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend.Dockerfile
          push: true
          build-args: |
            VITE_API_BASE=${{ vars.SERVICE_URL }}
            VITE_APP_VERSION=${{ steps.version.outputs.raw_tag }}
            VITE_CONSOLE_USER_URL=${{ vars.SERVICE_URL }}
            VITE_CONSOLE_TENANT_URL=${{ vars.SERVICE_URL }}
            VITE_CONSOLE_ADMIN_URL=${{ vars.SERVICE_URL }}
          tags: |
            ${{ steps.version.outputs.frontend_image }}
            ghcr.io/${{ env.GHCR_NAMESPACE }}/basaltpass-frontend:latest

      - name: Create deployment env file
        run: |
          cat > .deploy.env <<EOF
          JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
          BASALTPASS_ENV=production
          BASALTPASS_SERVER_ADDRESS=:8101
          BASALTPASS_DATABASE_DRIVER=${{ env.BASALTPASS_DATABASE_DRIVER }}
          BASALTPASS_DATABASE_DSN=${{ secrets.BASALTPASS_DATABASE_DSN }}
          BASALTPASS_CORS_ALLOW_ORIGINS=${{ env.BASALTPASS_CORS_ALLOW_ORIGINS }}
          EOF

          if [ -n "${BASALTPASS_EMAIL_PROVIDER}" ]; then
            echo "BASALTPASS_EMAIL_PROVIDER=${BASALTPASS_EMAIL_PROVIDER}" >> .deploy.env
          fi
          if [ -n "${BASALTPASS_EMAIL_FROM}" ]; then
            echo "BASALTPASS_EMAIL_FROM=${BASALTPASS_EMAIL_FROM}" >> .deploy.env
          fi
          if [ -n "${{ secrets.BASALTPASS_EMAIL_SMTP_HOST }}" ]; then
            echo "BASALTPASS_EMAIL_SMTP_HOST=${{ secrets.BASALTPASS_EMAIL_SMTP_HOST }}" >> .deploy.env
          fi
          if [ -n "${BASALTPASS_EMAIL_SMTP_PORT}" ]; then
            echo "BASALTPASS_EMAIL_SMTP_PORT=${BASALTPASS_EMAIL_SMTP_PORT}" >> .deploy.env
          fi
          if [ -n "${{ secrets.BASALTPASS_EMAIL_SMTP_USERNAME }}" ]; then
            echo "BASALTPASS_EMAIL_SMTP_USERNAME=${{ secrets.BASALTPASS_EMAIL_SMTP_USERNAME }}" >> .deploy.env
          fi
          if [ -n "${{ secrets.BASALTPASS_EMAIL_SMTP_PASSWORD }}" ]; then
            echo "BASALTPASS_EMAIL_SMTP_PASSWORD=${{ secrets.BASALTPASS_EMAIL_SMTP_PASSWORD }}" >> .deploy.env
          fi
          if [ -n "${BASALTPASS_EMAIL_SMTP_USE_TLS}" ]; then
            echo "BASALTPASS_EMAIL_SMTP_USE_TLS=${BASALTPASS_EMAIL_SMTP_USE_TLS}" >> .deploy.env
          fi
          if [ -n "${BASALTPASS_EMAIL_SMTP_USE_SSL}" ]; then
            echo "BASALTPASS_EMAIL_SMTP_USE_SSL=${BASALTPASS_EMAIL_SMTP_USE_SSL}" >> .deploy.env
          fi
          if [ -n "${BASALTPASS_EMAIL_SMTP_SKIP_CERT_VERIFY}" ]; then
            echo "BASALTPASS_EMAIL_SMTP_SKIP_CERT_VERIFY=${BASALTPASS_EMAIL_SMTP_SKIP_CERT_VERIFY}" >> .deploy.env
          fi
          if [ -n "${BASALTPASS_EMAIL_AWS_SES_REGION}" ]; then
            echo "BASALTPASS_EMAIL_AWS_SES_REGION=${BASALTPASS_EMAIL_AWS_SES_REGION}" >> .deploy.env
          fi
          if [ -n "${{ secrets.BASALTPASS_EMAIL_AWS_SES_ACCESS_KEY_ID }}" ]; then
            echo "BASALTPASS_EMAIL_AWS_SES_ACCESS_KEY_ID=${{ secrets.BASALTPASS_EMAIL_AWS_SES_ACCESS_KEY_ID }}" >> .deploy.env
          fi
          if [ -n "${{ secrets.BASALTPASS_EMAIL_AWS_SES_SECRET_ACCESS_KEY }}" ]; then
            echo "BASALTPASS_EMAIL_AWS_SES_SECRET_ACCESS_KEY=${{ secrets.BASALTPASS_EMAIL_AWS_SES_SECRET_ACCESS_KEY }}" >> .deploy.env
          fi
          if [ -n "${{ secrets.BASALTPASS_EMAIL_AWS_SES_CONFIGURATION_SET }}" ]; then
            echo "BASALTPASS_EMAIL_AWS_SES_CONFIGURATION_SET=${{ secrets.BASALTPASS_EMAIL_AWS_SES_CONFIGURATION_SET }}" >> .deploy.env
          fi

      - name: Prepare SSH access
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

          if [ -n "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ]; then
            printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
          else
            sudo apt-get update
            sudo apt-get install -y sshpass
          fi

      - name: Upload compose and env files
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          if [ -n "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
            scp -i ~/.ssh/id_ed25519 -P "${DEPLOY_PORT}" ./deploy/docker-compose.prod.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/docker-compose.yml"
            scp -i ~/.ssh/id_ed25519 -P "${DEPLOY_PORT}" ./.deploy.env "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/.env"
          else
            export SSHPASS="${DEPLOY_SSH_PASSWORD}"
            sshpass -e ssh -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
            sshpass -e scp -P "${DEPLOY_PORT}" -o StrictHostKeyChecking=yes ./deploy/docker-compose.prod.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/docker-compose.yml"
            sshpass -e scp -P "${DEPLOY_PORT}" -o StrictHostKeyChecking=yes ./.deploy.env "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/.env"
          fi

      - name: Deploy on Docker server
        env:
          BACKEND_IMAGE: ${{ steps.version.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ steps.version.outputs.frontend_image }}
          DEPLOY_GHCR_USERNAME: ${{ secrets.DEPLOY_GHCR_USERNAME }}
          DEPLOY_GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          BACKEND_IMAGE_ESCAPED="$(printf '%q' "${BACKEND_IMAGE}")"
          FRONTEND_IMAGE_ESCAPED="$(printf '%q' "${FRONTEND_IMAGE}")"
          DEPLOY_GHCR_USERNAME_ESCAPED="$(printf '%q' "${DEPLOY_GHCR_USERNAME}")"
          DEPLOY_GHCR_TOKEN_ESCAPED="$(printf '%q' "${DEPLOY_GHCR_TOKEN}")"

          REMOTE_COMMAND="export BACKEND_IMAGE=${BACKEND_IMAGE_ESCAPED} FRONTEND_IMAGE=${FRONTEND_IMAGE_ESCAPED} DEPLOY_GHCR_USERNAME=${DEPLOY_GHCR_USERNAME_ESCAPED} DEPLOY_GHCR_TOKEN=${DEPLOY_GHCR_TOKEN_ESCAPED} && cd '${DEPLOY_PATH}' && echo \"\$DEPLOY_GHCR_TOKEN\" | docker login ghcr.io -u \"\$DEPLOY_GHCR_USERNAME\" --password-stdin && docker compose pull && docker compose up -d --remove-orphans"

          if [ -n "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "${REMOTE_COMMAND}"
          else
            export SSHPASS="${DEPLOY_SSH_PASSWORD}"
            sshpass -e ssh -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "${REMOTE_COMMAND}"
          fi

      - name: Collect remote diagnostics on deploy failure
        if: failure()
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          REMOTE_DEBUG_COMMAND="cd '${DEPLOY_PATH}' && docker compose ps -a && echo '--- backend logs ---' && docker compose logs backend --tail 200"

          if [ -n "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "${REMOTE_DEBUG_COMMAND}" || true
          else
            export SSHPASS="${DEPLOY_SSH_PASSWORD}"
            sshpass -e ssh -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "${REMOTE_DEBUG_COMMAND}" || true
          fi

      - name: Verify health check on server
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          DEPLOY_PATH_ESCAPED="$(printf '%q' "${DEPLOY_PATH}")"
          REMOTE_HEALTHCHECK_COMMAND="$(cat <<EOF
          set -eu
          cd ${DEPLOY_PATH_ESCAPED}

          attempt=1
          max_attempts=36
          sleep_seconds=10

          while [ "\$attempt" -le "\$max_attempts" ]; do
            health_status="\$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:5104/health || true)"
            if [ "\$health_status" = "200" ]; then
              echo "Health check passed on attempt \$attempt/\$max_attempts"
              exit 0
            fi

            echo "Health check pending on attempt \$attempt/\$max_attempts: status=\$health_status"
            sleep "\$sleep_seconds"
            attempt=\$((attempt + 1))
          done

          echo "Health check failed after \$max_attempts attempts: http://127.0.0.1:5104/health"
          docker compose ps || true
          docker compose logs --tail=100 backend frontend || true
          exit 1
          EOF
          )"

          if [ -n "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ]; then
            ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "${REMOTE_HEALTHCHECK_COMMAND}"
          else
            export SSHPASS="${DEPLOY_SSH_PASSWORD}"
            sshpass -e ssh -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "${REMOTE_HEALTHCHECK_COMMAND}"
          fi

      - name: Mark deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_id }}'),
              state: 'success',
              environment: 'production',
              environment_url: '${{ vars.SERVICE_URL }}',
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Mark deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_id }}'),
              state: 'failure',
              environment: 'production',
              environment_url: '${{ vars.SERVICE_URL }}',
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
